<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular 3D WebGL Roguelike</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Arial Black', Gadget, sans-serif; user-select: none; color: #fff; }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            display: flex; flex-direction: column; justify-content: space-between; pointer-events: none;
        }
        .top-bar { display: flex; justify-content: space-between; padding: 20px 40px; font-size: 1.2rem; letter-spacing: 2px; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 5px; border: 1px solid #444; }
        .hp-bar-container { width: 200px; height: 20px; background: #331111; border: 2px solid #ff4444; margin-top: 5px; overflow: hidden; }
        #player-hp-fill { width: 100%; height: 100%; background: #ff4444; transition: width 0.2s; }
        
        #enemy-hud { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); text-align: center; display: none; }
        #enemy-name { font-size: 1.5rem; color: #ff3333; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 10px #ff0000; }
        .enemy-hp-container { width: 300px; height: 15px; background: #220000; border: 1px solid #ff3333; }
        #enemy-hp-fill { width: 100%; height: 100%; background: #ff3333; transition: width 0.2s; }

        .path-label {
            position: absolute; top: 58%; width: 220px; text-align: center; font-size: 0.9rem;
            letter-spacing: 1px; background: rgba(0, 0, 0, 0.7); border: 1px solid #444;
            padding: 8px 12px; border-radius: 4px; pointer-events: none; display: none; z-index: 3;
            text-transform: uppercase; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #path-left { left: calc(50% - 275px); }
        #path-right { left: calc(50% + 55px); }

        #combat-actions {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: none; gap: 20px; pointer-events: auto;
        }
        #center-prompt {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.2rem; text-align: center; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 15px rgba(255,255,255,0.8); width: 80%; line-height: 1.4;
        }

        button {
            background: #111; color: #fff; border: 3px solid #666; padding: 15px 30px;
            font-family: inherit; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            border-radius: 8px; box-shadow: 0 5px 0 #333; transition: all 0.1s;
        }
        button:hover { background: #222; border-color: #fff; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #333; }
        .btn-atk { border-color: #ff3333; color: #ff3333; }
        .btn-def { border-color: #3388ff; color: #3388ff; }
        .btn-pot { border-color: #33ff33; color: #33ff33; }
        .btn-spl { border-color: #e066ff; color: #e066ff; }

        #flash-overlay { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 5; pointer-events: none; background: rgba(255,0,0,0); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="webgl-container"></div>

    <div id="path-left" class="path-label"></div>
    <div id="path-right" class="path-label"></div>

    <div id="hud">
        <div class="top-bar">
            <div class="stat-box">
                LVL: <span id="lbl-level" style="color: #33aaff;">1</span> |
                EXP: <span id="lbl-exp">0</span>/<span id="lbl-exp-needed">10</span><br>
                DEPTH: <span id="lbl-depth">1</span>
                <div class="hp-bar-container"><div id="player-hp-fill"></div></div>
            </div>
            <div class="stat-box" style="text-align: right;">
                GOLD: <span id="lbl-gold" style="color: #ffd700;">0</span><br>
                POTIONS: <span id="lbl-pots" style="color: #33ff33;">3</span><br>
                SCROLLS: <span id="lbl-scrolls" style="color: #e066ff;">0</span>
            </div>
        </div>

        <div id="enemy-hud">
            <div id="enemy-name">MONSTER</div>
            <div class="enemy-hp-container"><div id="enemy-hp-fill"></div></div>
        </div>

        <div id="center-prompt">CLICK TO START</div>

        <div id="combat-actions">
            <button class="btn-atk" onclick="handleAction('attack')">⚔️ ATTACK</button>
            <button class="btn-def" onclick="combatAction('defend')">🛡️ DEFEND</button>
            <button class="btn-pot" onclick="combatAction('heal')">🧪 POTION</button>
            <button class="btn-spl" onclick="combatAction('spell')">🔮 SPELL</button>
        </div>
    </div>

    <script>
        // ==========================================
        //  CONTENT DATABASE
        // ==========================================

        const ROOM_POOL = [
            {
                name: "Shattered Armory",
                chance: 25,
                color: 0xaa5533,
                action: function() {
                    if (Math.random() < 0.70) {
                        battleEnemy("IRON GOLEM");
                    } else {
                        giveGold(15 + depth, "FOUND AN UNTOUCHED WEAPON RACK!");
                    }
                }
            },
            {
                name: "Fae Glade Ruins",
                chance: 20,
                color: 0x33ff99,
                action: function() {
                    if (Math.random() < 0.60) {
                        healPlayer(12, "YOU GOT HEALED BY THE FAES");
                    } else {
                        battleEnemy("VOID WRAITH");
                    }
                }
            },
            {
                name: "Cursed Burial Grounds",
                chance: 25,
                color: 0xff3333,
                action: function() {
                    battleEnemy("SABER WOLF");
                }
            },
            {
                name: "Strange Bazaar",
                chance: 25,
                color: 0xffaa00,
                action: function() {
                    openShop();
                }
            },
            {
                name: "Obsidian Core",
                chance: 20,
                color: 0xff5500,
                action: function() {
                    if (Math.random() < 0.5) {
                        battleEnemy("MAGMA DREDGE");
                    } else {
                        giveGold(20 + (depth * 2), "MINED MAGMATIC CORE CRYSTALS!");
                    }
                }
            },
            {
                name: "Sunken Library",
                chance: 15,
                color: 0xe066ff,
                action: function() {
                    scrolls += 2;
                    UI.prompt.innerHTML = "YOU DECIPHERED AN ANCIENT PEDESTAL!<br><span style='color:#e066ff'>+2 SPELL SCROLLS ACQUIRED</span>";
                    const mat = new THREE.MeshStandardMaterial({color: 0xe066ff, wireframe: true});
                    mainTarget = new THREE.Mesh(geometries.wraith, mat);
                    scene.add(mainTarget);
                    updateHUD();
                    triggerFlash("rgba(224,102,255,0.2)");
                    setNextActionTimeout();
                }
            },
            {
                name: "Toxic Catacombs",
                chance: 20,
                color: 0x75ff33,
                action: function() {
                    if (Math.random() < 0.65) {
                        battleEnemy("PLAGUE STALKER");
                    } else {
                        pots++;
                        healPlayer(6, "SALVAGED AN ABANDONED ALCHEMY LAB STASH!");
                    }
                }
            }
        ];

        const ENEMY_REGISTRY = {
            "SABER WOLF": {
                model: "wolf",
                color: 0xff3333,
                calculateHealth: function(lvl) { return 12 + (lvl * 3); },
                calculateAttack: function(lvl) { return 4 + Math.floor(lvl / 2); },
                expValue: 6,
                actions: [
                    { type: "attack", text: "THE WOLF BITES RUTHLESSLY!", modifier: 1.0 },
                    { type: "attack", text: "THE WOLF SLASHES WITH ITS CLAWS!", modifier: 0.8 }
                ]
            },
            "IRON GOLEM": {
                model: "golem",
                color: 0xaa5533,
                calculateHealth: function(lvl) { return 20 + (lvl * 4); },
                calculateAttack: function(lvl) { return 5 + Math.floor(lvl / 2); },
                expValue: 10,
                actions: [
                    { type: "attack", text: "THE GOLEM SMASHES THE EARTH!", modifier: 1.2 },
                    { type: "attack", text: "THE GOLEM SLAMS ITS HEAVY FISTS!", modifier: 1.0 }
                ]
            },
            "VOID WRAITH": {
                model: "wraith",
                color: 0x33ffff,
                calculateHealth: function(lvl) { return 15 + (lvl * 3); },
                calculateAttack: function(lvl) { return 4 + Math.floor(lvl / 2); },
                expValue: 8,
                actions: [
                    { type: "attack", text: "THE WRAITH SIPHONS YOUR SOUL!", modifier: 0.9 },
                    { type: "heal", text: "THE WRAITH SHIFTS DENSITY TO REGENERATE!", value: 6 }
                ]
            },
            "MAGMA DREDGE": {
                model: "golem",
                color: 0xff5500,
                calculateHealth: function(lvl) { return 18 + (lvl * 5); },
                calculateAttack: function(lvl) { return 6 + Math.floor(lvl / 2); },
                expValue: 12,
                actions: [
                    { type: "attack", text: "THE DREDGE SPEWS MOLTEN SLAG!", modifier: 1.3 },
                    { type: "attack", text: "HEAT FLARES SEAR YOUR ARMOR!", modifier: 0.9 }
                ]
            },
            "PLAGUE STALKER": {
                model: "wolf",
                color: 0x75ff33,
                calculateHealth: function(lvl) { return 14 + (lvl * 3); },
                calculateAttack: function(lvl) { return 5 + Math.floor(lvl / 2); },
                expValue: 9,
                actions: [
                    { type: "attack", text: "THE STALKER INFLICTS A TOXIC BITE!", modifier: 1.1 },
                    { type: "heal", text: "THE STALKER FEEDS ON REANIMATED CELLS!", value: 8 }
                ]
            }
        };


        // ==========================================
        //  WEBGL GRAPHICS ENGINE
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.04);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x222233));
        const light = new THREE.PointLight(0xffffff, 2, 50);
        light.position.set(0, 3, 5);
        scene.add(light);
        
        

        const geometries = {
            room: new THREE.IcosahedronGeometry(1.8, 1),
            wolf: new THREE.TetrahedronGeometry(1.8, 0),
            golem: new THREE.BoxGeometry(2, 2, 2),
            wraith: new THREE.TorusKnotGeometry(1, 0.3, 64, 8),
            treasure: new THREE.DodecahedronGeometry(1.3, 0),
            fountain: new THREE.SphereGeometry(1.5, 16, 16),
            merchant: new THREE.ConeGeometry(1.3, 2.5, 5)
        };

        let activeEntities = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const partGeo = new THREE.BufferGeometry();
        const count = 400;
        const arr = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) arr[i] = (Math.random() - 0.5) * 25;
        partGeo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
        const partMesh = new THREE.Points(partGeo, new THREE.PointsMaterial({size: 0.06, color: 0x6666aa}));
        scene.add(partMesh);

        camera.position.set(0, 0, 7);

        let mainTarget = null, leftChoice = null, rightChoice = null;
        let shakeTimer = 0, globalTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            globalTime += 0.02;
            partMesh.rotation.y += 0.0005;

            if (mainTarget) {
                mainTarget.rotation.x += 0.01;
                mainTarget.rotation.y += 0.015;
                mainTarget.position.y = Math.sin(globalTime * 2) * 0.15;
                
                if (shakeTimer > 0) {
                    shakeTimer--;
                    mainTarget.position.x = (Math.random() - 0.5) * 0.3;
                } else { mainTarget.position.x = 0; }
            }

            if (leftChoice && rightChoice) {
                leftChoice.rotation.y += 0.01; rightChoice.rotation.y += 0.01;
                leftChoice.position.y = Math.sin(globalTime * 3) * 0.1;
                rightChoice.position.y = Math.cos(globalTime * 3) * 0.1;
            }
            renderer.render(scene, camera);
        }
        animate();

        function clearSceneObjects() {
            if(mainTarget) scene.remove(mainTarget);
            if(leftChoice) scene.remove(leftChoice);
            if(rightChoice) scene.remove(rightChoice);
            mainTarget = leftChoice = rightChoice = null;
            activeEntities = [];
            document.getElementById('path-left').style.display = 'none';
            document.getElementById('path-right').style.display = 'none';
        }


        // ==========================================
        //  CORE ENGINE RUNTIME LOGIC
        // ==========================================
        let pHP = 30, pMaxHP = 30, gold = 20, depth = 0, pots = 2, scrolls = 1;
        let pLevel = 1, pExp = 0, pExpNeeded = 10; // Experience Tracking Matrices
        let activeEnemy = { blueprint: null, hp: 0, max: 0, atk: 0 };
        let state = "START_SCREEN";
        let currentLeftRoom = null, currentRightRoom = null;

        const UI = {
            level: document.getElementById('lbl-level'),
            exp: document.getElementById('lbl-exp'),
            expNeeded: document.getElementById('lbl-exp-needed'),
            depth: document.getElementById('lbl-depth'),
            gold: document.getElementById('lbl-gold'),
            pots: document.getElementById('lbl-pots'),
            scrolls: document.getElementById('lbl-scrolls'),
            pHpFill: document.getElementById('player-hp-fill'),
            eHpFill: document.getElementById('enemy-hp-fill'),
            eName: document.getElementById('enemy-name'),
            eHud: document.getElementById('enemy-hud'),
            prompt: document.getElementById('center-prompt'),
            actions: document.getElementById('combat-actions'),
            flash: document.getElementById('flash-overlay')
        };

        window.addEventListener('click', onSceneClick);
        function onSceneClick(e) {
            if (state === "START_SCREEN") { startGame(); return; }
            if (state === "GAME_OVER_SCREEN") { resetPlayerStatsToDefault(); startGame(); return; }
            if (state !== "CHOOSE") return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(activeEntities);
            if (intersects.length > 0) {
                const sideSelected = intersects[0].object.name;
                executePathSelection(sideSelected === "left" ? currentLeftRoom : currentRightRoom);
            }
        }

        function triggerFlash(colorHex) {
            UI.flash.style.background = colorHex;
            setTimeout(() => UI.flash.style.background = "rgba(0,0,0,0)", 100);
        }

        function updateHUD() {
            UI.level.innerText = pLevel; UI.exp.innerText = pExp; UI.expNeeded.innerText = pExpNeeded;
            UI.depth.innerText = depth; UI.gold.innerText = gold; UI.pots.innerText = pots; UI.scrolls.innerText = scrolls;
            UI.pHpFill.style.width = `${(pHP/pMaxHP)*100}%`;
            if(state === "BATTLE") {
                UI.eHud.style.display = "block";
                UI.eHpFill.style.width = `${(activeEnemy.hp/activeEnemy.max)*100}%`;
            } else { UI.eHud.style.display = "none"; }
        }

        function getRandomRoomByWeight() {
            let totalWeight = ROOM_POOL.reduce((sum, r) => sum + r.chance, 0);
            let roll = Math.random() * totalWeight;
            for (let r of ROOM_POOL) {
                roll -= r.chance;
                if (roll <= 0) return r;
            }
            return ROOM_POOL[0];
        }

        function resetPlayerStatsToDefault() {
            pHP = 30; pMaxHP = 30; gold = 20; depth = 0; pots = 2; scrolls = 1;
            pLevel = 1; pExp = 0; pExpNeeded = 10;
        }

        function startGame() { buildChoiceEnvironment(); }

        function buildChoiceEnvironment() {
            state = "CHOOSE";
            depth++;
            clearSceneObjects();
            updateHUD();

            UI.prompt.innerText = "CHOOSE YOUR PATH";
            UI.prompt.style.color = "#ffffff";
            UI.actions.style.display = "none";

            currentLeftRoom = getRandomRoomByWeight();
            currentRightRoom = getRandomRoomByWeight();
            while(currentRightRoom === currentLeftRoom) { currentRightRoom = getRandomRoomByWeight(); }

            const labelL = document.getElementById('path-left');
            const labelR = document.getElementById('path-right');
            labelL.innerText = currentLeftRoom.name;
            labelR.innerText = currentRightRoom.name;
            
            labelL.style.borderColor = `#${currentLeftRoom.color.toString(16)}`;
            labelL.style.color = `#${currentLeftRoom.color.toString(16)}`;
            labelR.style.borderColor = `#${currentRightRoom.color.toString(16)}`;
            labelR.style.color = `#${currentRightRoom.color.toString(16)}`;
            
            labelL.style.display = 'block'; labelR.style.display = 'block';

            const matL = new THREE.MeshStandardMaterial({color: currentLeftRoom.color, wireframe: true});
            leftChoice = new THREE.Mesh(geometries.room, matL);
            leftChoice.position.set(-2.5, 0.3, 0); leftChoice.name = "left";
            scene.add(leftChoice); activeEntities.push(leftChoice);

            const matR = new THREE.MeshStandardMaterial({color: currentRightRoom.color, wireframe: true});
            rightChoice = new THREE.Mesh(geometries.room, matR);
            rightChoice.position.set(2.5, 0.3, 0); rightChoice.name = "right";
            scene.add(rightChoice); activeEntities.push(rightChoice);
        }

        function executePathSelection(selectedRoomBlueprint) {
            state = "EVENT";
            clearSceneObjects();
            selectedRoomBlueprint.action();
        }


        // ==========================================
        //  ENGINE API HELPERS
        // ==========================================

        function giveGold(amount, textString) {
            UI.prompt.innerHTML = `${textString}<br><span style='color:#ffd700'>+${amount} GOLD</span>`;
            const mat = new THREE.MeshStandardMaterial({color: 0xffd700, roughness: 0.1});
            mainTarget = new THREE.Mesh(geometries.treasure, mat);
            scene.add(mainTarget);
            gold += amount;
            updateHUD();
            triggerFlash("rgba(255,215,0,0.2)");
            setNextActionTimeout();
        }

        function healPlayer(amount, textString) {
            UI.prompt.innerHTML = `${textString}<br><span style='color:#33ff33'>+${amount} HP REGENERATED</span>`;
            const mat = new THREE.MeshStandardMaterial({color: 0x33ff33, wireframe: true});
            mainTarget = new THREE.Mesh(geometries.fountain, mat);
            scene.add(mainTarget);
            pHP = Math.min(pMaxHP, pHP + amount);
            updateHUD();
            triggerFlash("rgba(51,255,51,0.2)");
            setNextActionTimeout();
        }

        function battleEnemy(enemyIdString) {
            state = "BATTLE";
            UI.actions.style.display = "flex";

            const blueprint = ENEMY_REGISTRY[enemyIdString];
            activeEnemy.blueprint = blueprint;
            activeEnemy.max = blueprint.calculateHealth(depth);
            activeEnemy.hp = activeEnemy.max;
            activeEnemy.atk = blueprint.calculateAttack(depth);

            UI.prompt.innerText = `${enemyIdString} ENGAGED!`;
            UI.prompt.style.color = "#ff3333";
            UI.eName.innerText = enemyIdString;

            const mat = new THREE.MeshStandardMaterial({color: blueprint.color, roughness: 0.5});
            mainTarget = new THREE.Mesh(geometries[blueprint.model], mat);
            scene.add(mainTarget);
            
            updateHUD();
        }

        function openShop() {
            state = "SHOP";
            UI.prompt.innerText = "WELCOME TRADER... CHOOSE RESOURCE";
            UI.prompt.style.color = "#ffd700";
            
            const mat = new THREE.MeshStandardMaterial({color: 0xffaa00, roughness: 0.4});
            mainTarget = new THREE.Mesh(geometries.merchant, mat);
            scene.add(mainTarget);

            UI.actions.style.display = "flex";
            UI.actions.innerHTML = `
                <button class="btn-pot" onclick="buyItem('potion', 15)">🧪 POTION (15G)</button>
                <button class="btn-spl" onclick="buyItem('scroll', 25)">🔮 SCROLL (25G)</button>
                <button class="btn-def" onclick="exitShop()">🚪 LEAVE</button>
            `;
        }

        function buyItem(item, cost) {
            if (gold >= cost) {
                gold -= cost;
                if (item === 'potion') pots++;
                if (item === 'scroll') scrolls++;
                UI.prompt.innerText = `PURCHASED ${item.toUpperCase()}!`;
                triggerFlash("rgba(255,215,0,0.15)");
            } else {
                UI.prompt.innerText = "NOT ENOUGH GOLD!";
                triggerFlash("rgba(255,0,0,0.15)");
            }
            updateHUD();
            setTimeout(() => { if(state === "SHOP") UI.prompt.innerText = "ANYTHING ELSE?"; }, 1000);
        }

        function exitShop() {
            UI.actions.innerHTML = `
                <button class="btn-atk" onclick="handleAction('attack')">⚔️ ATTACK</button>
                <button class="btn-def" onclick="combatAction('defend')">🛡️ DEFEND</button>
                <button class="btn-pot" onclick="combatAction('heal')">🧪 POTION</button>
                <button class="btn-spl" onclick="combatAction('spell')">🔮 SPELL</button>
            `;
            UI.actions.style.display = "none";
            setNextActionTimeout();
        }

        function setNextActionTimeout() {
            setTimeout(() => { buildChoiceEnvironment(); }, 2000);
        }


        // ==========================================
        //  COMBAT ENGINE
        // ==========================================
        function handleAction(act) { if (state === "BATTLE") combatAction(act); }

        function combatAction(type) {
            let pDefending = false;

            if (type === 'attack') {
                // Player base damage scales dynamically with level (+3 per Level)
                const baseAtk = 5 + (pLevel * 3);
                const dmg = baseAtk + Math.floor(Math.random() * 6);
                activeEnemy.hp -= dmg;
                UI.prompt.innerText = `YOU STRUCK FOR -${dmg}`;
                executeVisualHit();
            }
            else if (type === 'spell') {
                if (scrolls > 0) {
                    scrolls--;
                    // Spell bursts scale directly off player level thresholds
                    const baseSpell = 15 + (pLevel * 5);
                    const dmg = baseSpell + Math.floor(Math.random() * 10);
                    activeEnemy.hp -= dmg;
                    UI.prompt.innerText = `🔮 MAGIC BURST DEALS -${dmg}!`;
                    triggerFlash("rgba(224, 102, 255, 0.4)");
                    executeVisualHit();
                } else {
                    UI.prompt.innerText = "NO SCROLLS IN INVENTORY!";
                    return;
                }
            }
            else if (type === 'defend') { pDefending = true; UI.prompt.innerText = "GUARD RAISED"; }
            else if (type === 'heal') {
                if (pots > 0) {
                    pots--; pHP = Math.min(pMaxHP, pHP + 15);
                    UI.prompt.innerText = "+15 HP RECOVERED";
                    triggerFlash("rgba(51,255,51,0.15)");
                } else { UI.prompt.innerText = "OUT OF POTIONS!"; return; }
            }

            updateHUD();

            if (activeEnemy.hp <= 0) { executeVictory(); return; }

            UI.actions.style.pointerEvents = "none";
            
            setTimeout(() => {
                if(state !== "BATTLE") return;
                
                const aiPool = activeEnemy.blueprint.actions;
                const aiSelection = aiPool[Math.floor(Math.random() * aiPool.length)];

                if(aiSelection.type === "attack") {
                    let finalDmg = Math.floor((Math.random() * 3 + activeEnemy.atk) * aiSelection.modifier);
                    if(pDefending) finalDmg = Math.max(1, Math.floor(finalDmg / 3));
                    pHP -= finalDmg;
                    UI.prompt.innerHTML = `<span style='font-size:1.2rem; color:#ffaaaa'>${aiSelection.text}</span><br>-${finalDmg} HP RECEIVED`;
                    triggerFlash("rgba(255,0,0,0.3)");
                }
                else if(aiSelection.type === "heal") {
                    activeEnemy.hp = Math.min(activeEnemy.max, activeEnemy.hp + aiSelection.value);
                    UI.prompt.innerHTML = `<span style='font-size:1.2rem; color:#44ff44'>${aiSelection.text}</span><br>+${aiSelection.value} FOE HP REGEN`;
                }

                updateHUD();

                if (pHP <= 0) { executeGameOver(); }
                else { UI.actions.style.pointerEvents = "auto"; }
            }, 1200);
        }

        function executeVisualHit() {
            shakeTimer = 15;
            if(mainTarget) mainTarget.material.color.setHex(0xffffff);
            setTimeout(() => { if(mainTarget) mainTarget.material.color.setHex(activeEnemy.blueprint.color); }, 100);
        }

        function executeVictory() {
            state = "EVENT";
            UI.actions.style.display = "none"; UI.actions.style.pointerEvents = "auto";
            if(mainTarget) mainTarget.material.wireframe = true;

            const gainedExp = activeEnemy.blueprint.expValue;
            pExp += gainedExp;
            gold += 10 + depth * 2;

            let levelUpOccurred = false;
            // Handle multiple level up jumps if excessive experience overflows requirements
            while (pExp >= pExpNeeded) {
                pExp -= pExpNeeded;
                pLevel++;
                pExpNeeded = Math.floor(pExpNeeded * 1.5); // Escalating requirement formula
                pMaxHP += 10; // Gain max health
                pHP = pMaxHP; // Full heal bonus award
                levelUpOccurred = true;
            }

            if(levelUpOccurred) {
                UI.prompt.innerHTML = `FOE SHATTERED! LEVEL UP!<br><span style='color:#33aaff'>REACHED LEVEL ${pLevel} (+MAX HP/DMG)</span>`;
                UI.prompt.style.color = "#33aaff";
                triggerFlash("rgba(51,170,255,0.4)");
            } else {
                UI.prompt.innerHTML = `FOE SHATTERED<br><span style='color:#33aaff'>+${gainedExp} EXP GAINED</span>`;
                UI.prompt.style.color = "#33ffff";
            }

            updateHUD();
            setNextActionTimeout();
        }

        function executeGameOver() {
            state = "GAME_OVER_SCREEN";
            UI.actions.style.display = "none"; UI.actions.style.pointerEvents = "auto";
            UI.prompt.innerText = `DIED AT DEPTH ${depth}. CLICK TO RESTART.`;
            UI.prompt.style.color = "#ff0000";
            if(mainTarget) mainTarget.material.color.setHex(0x222222);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
