<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular 3D WebGL Roguelike - BIG ASS UPDATE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Arial Black', Gadget, sans-serif; user-select: none; color: #fff; }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            display: flex; flex-direction: column; justify-content: space-between; pointer-events: none;
        }
        .top-bar { display: flex; justify-content: space-between; padding: 20px 40px; font-size: 1rem; letter-spacing: 1px; }
        .stat-box { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 5px; border: 1px solid #444; min-width: 250px; }
        
        .bar-container { width: 100%; height: 15px; background: #222; border: 1px solid #666; margin-top: 5px; overflow: hidden; position: relative;}
        #player-hp-fill { width: 100%; height: 100%; background: #ff4444; transition: width 0.2s     ; }
        #player-mp-fill { width: 100%; height: 100%; background: #4488ff; transition: width 0.2s; }
        
        .equipment-text { font-size: 0.85rem; color: #aaa; margin-top: 8px; border-top: 1px solid #444; padding-top: 5px; }

        #enemy-hud { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); text-align: center; display: none; }
        #enemy-name { font-size: 1.5rem; color: #ff3333; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 10px #ff0000; }
        .enemy-hp-container { width: 300px; height: 15px; background: #220000; border: 1px solid #ff3333; }
        #enemy-hp-fill { width: 100%; height: 100%; background: #ff3333; transition: width 0.2s; }

        .path-label {
            position: absolute; top: 58%; width: 220px; text-align: center; font-size: 0.9rem;
            letter-spacing: 1px; background: rgba(0, 0, 0, 0.7); border: 1px solid #444;
            padding: 8px 12px; border-radius: 4px; pointer-events: none; display: none; z-index: 3;
            text-transform: uppercase; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #path-left { left: calc(50% - 275px); }
        #path-right { left: calc(50% + 55px); }

        #combat-actions {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: none; flex-wrap: wrap; justify-content: center; gap: 15px; pointer-events: auto; max-width: 800px;
        }
        #center-prompt {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.2rem; text-align: center; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 15px rgba(255,255,255,0.8); width: 80%; line-height: 1.4;
        }

        button {
            background: #111; color: #fff; border: 2px solid #666; padding: 12px 25px;
            font-family: inherit; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            border-radius: 6px; box-shadow: 0 4px 0 #333; transition: all 0.1s; min-width: 140px;
        }
        button:hover { background: #222; border-color: #fff; }
        button:active { transform: translateY(4px); box-shadow: 0 0px 0 #333; }
        .btn-atk { border-color: #ff5555; color: #ff5555; }
        .btn-def { border-color: #aaaaaa; color: #aaaaaa; }
        .btn-pot { border-color: #55ff55; color: #55ff55; }
        .btn-spl { border-color: #aa55ff; color: #aa55ff; }
        .btn-back { border-color: #ffaa00; color: #ffaa00; }

        #flash-overlay { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 5; pointer-events: none; background: rgba(255,0,0,0); transition: background 0.1s;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="webgl-container"></div>

    <div id="path-left" class="path-label"></div>
    <div id="path-right" class="path-label"></div>

    <div id="hud">
        <div class="top-bar">
            <div class="stat-box">
                LVL: <span id="lbl-level" style="color: #33aaff;">1</span> |
                EXP: <span id="lbl-exp">0</span>/<span id="lbl-exp-needed">10</span><br>
                HP: <span id="lbl-hp">30/30</span>
                <div class="bar-container" style="border-color:#ff4444;"><div id="player-hp-fill"></div></div>
                MP: <span id="lbl-mp">10/10</span>
                <div class="bar-container" style="border-color:#4488ff;"><div id="player-mp-fill"></div></div>
            </div>
            <div class="stat-box" style="text-align: right;">
                DEPTH: <span id="lbl-depth">1</span> | GOLD: <span id="lbl-gold" style="color: #ffd700;">0</span><br>
                <div class="equipment-text">
                    ⚔️ WEP: <span id="lbl-wep" style="color:#fff;">RUSTY DAGGER (+2)</span><br>
                    🛡️ ARM: <span id="lbl-arm" style="color:#fff;">CLOTH TUNIC (+1)</span>
                </div>
            </div>
        </div>

        <div id="enemy-hud">
            <div id="enemy-name">MONSTER</div>
            <div class="enemy-hp-container"><div id="enemy-hp-fill"></div></div>
        </div>

        <div id="center-prompt">CLICK TO START</div>

        <div id="combat-actions"></div>
    </div>
    <script>
        // ==========================================
        //  GLOBAL STATE & INVENTORY
        // ==========================================
        let pHP = 30, pMaxHP = 30, pMP = 10, pMaxMP = 10;
        let pLevel = 1, pExp = 0, pExpNeeded = 10;
        let gold = 20, depth = 0;
        
        // Structured Inventory Tracking Architecture
        let inventory = {
            hpPotions: 2,
            mpPotions: 1,
            weapons: [],
            armors: []
        };

        let equipment = {
            weapon: { name: "RUSTY DAGGER", atk: 2 },
            armor:  { name: "CLOTH TUNIC", def: 1 }
        };

        let knownSpells = [
            { id: "zap", name: "⚡ SPARK", cost: 3, baseDmg: 8, color: "rgba(255,255,0,0.4)" }
        ];

        const ALL_SPELLS = [
            { id: "fireball", name: "🔥 FIREBALL", cost: 6, baseDmg: 18, color: "rgba(255,68,0,0.4)" },
            { id: "ice", name: "❄️ ICE LANCE", cost: 5, baseDmg: 14, color: "rgba(0,200,255,0.4)" },
            { id: "drain", name: "🌿 DRAIN SOUL", cost: 8, baseDmg: 12, heals: 10, color: "rgba(50,255,50,0.4)" },
            { id: "void", name: "🌌 VOID CRUSH", cost: 12, baseDmg: 35, color: "rgba(150,0,255,0.4)" }
        ];

        const EQUIPMENT_REGISTRY = {
            weapons: [
                { name: "STEEL SWORD", baseAtk: 4 },
                { name: "WARHAMMER", baseAtk: 6 },
                { name: "BATTLE AXE", baseAtk: 8 },
                { name: "OBSIDIAN BLADE", baseAtk: 12 },
                { name: "VOID SCYTHE", baseAtk: 15 }
            ],
            armors: [
                { name: "CHAINMAIL", baseDef: 3 },
                { name: "IRON PLATE", baseDef: 5 },
                { name: "DRAGON SCALE", baseDef: 8 },
                { name: "SHADOW CLOAK", baseDef: 12 },
                { name: "AEGIS ARMOR", baseDef: 15 }
            ]
        };

        let activeEnemy = { blueprint: null, hp: 0, max: 0, atk: 0 };
        let state = "START_SCREEN";
        let currentLeftRoom = null, currentRightRoom = null;

        // ==========================================
        //  CONTENT DATABASE
        // ==========================================
        const ROOM_POOL = [
            {
                name: "Shattered Armory", chance: 25, color: 0xaa5533,
                action: function() {
                    if (Math.random() < 0.6) battleEnemy("IRON GOLEM");
                    else grantEquipment();
                },
                minDepth: 5
            },
            {
                name: "Fae Glade Ruins", chance: 20, color: 0x33ff99,
                action: function() {
                    if (Math.random() < 0.5) healPlayer(20, "YOU RESTED IN THE FAE GLADE");
                    else battleEnemy("PLAGUE STALKER");
                }
            },
            {
                name: "Cursed Burial Grounds", chance: 25, color: 0xff3333,
                action: function() { battleEnemy("SABER WOLF"); }
            },
            {
                name: "Strange Bazaar", chance: 20, color: 0xffaa00,
                action: function() { openShop(); }
            },
            {
                name: "Sunken Library", chance: 15, color: 0xe066ff,
                action: function() {
                    if (Math.random() < 0.3) battleEnemy("VOID WRAITH");
                    else grantSpellScroll();
                },
                minDepth: 10,
            },
            {
                name: "Tavern", chance: 10, color: 0x00fbff,
                action: function() { openTavern(); }
            },
            {
                name: "Hidden Dealer", chance: 10, color: 0x00ffff,
                action: function() {
                    if (Math.random() < 0.4) battleEnemy("GUARDIAN OF GALAXIES");
                    else openShop();
                },
                minDepth: 15
            }
        ];

        const ENEMY_REGISTRY = {
            "SABER WOLF": {
                model: "wolf", color: 0xff3333,
                hp: (lvl) => 15 + (lvl * 4), atk: (lvl) => 4 + Math.floor(lvl * 1.5), expValue: 6,
                actions: [{ type: "attack", text: "THE WOLF BITES!", mod: 1.0 }],
            },
            "IRON GOLEM": {
                model: "golem", color: 0xaa5533,
                hp: (lvl) => 25 + (lvl * 5), atk: (lvl) => 6 + Math.floor(lvl * 1.5), expValue: 12,
                actions: [{ type: "attack", text: "THE GOLEM SMASHES!", mod: 1.2 }],
                drops: function() {grantEquipment();},
                dropChance: 0.5
            },
            "VOID WRAITH": {
                model: "wraith", color: 0x33ffff,
                hp: (lvl) => 18 + (lvl * 3), atk: (lvl) => 5 + Math.floor(lvl * 1.5), expValue: 10,
                actions: [{ type: "attack", text: "THE WRAITH SIPHONS!", mod: 1.0 }, { type: "heal", text: "WRAITH REGENERATES!", val: 8 }]
            },
            "PLAGUE STALKER": {
                model: "wolf", color: 0x75ff33,
                hp: (lvl) => 16 + (lvl * 4), atk: (lvl) => 5 + Math.floor(lvl * 1.5), expValue: 9,
                actions: [{ type: "attack", text: "TOXIC BITE!", mod: 1.1 }]
            },
            "GUARDIAN OF GALAXIES": {
                model: "guardian", color: 0xff3333,
                hp: (lvl) => 40 + (lvl * 2), atk: (lvl) => 6 + Math.floor(lvl * 0,5), expValue: 12,
                actions: [{ type: "attack", text: "THE GUARDIAN OF GALAXIES SLAMS!", mod: 1.0 }],
                drops: function() {inventory.armors.push({ id: "galaxy", name: "GALAXY STRIKE", cost: 20, baseDmg: 70, heals: -15, color: "rgba(0,0,0,0.0)"  });},
                dropChance: 0.5
            }
        };
        
        const GAMBLE_GAMES = [
            {
                name: "COIN FLIP",
                action: function(input) {
                    var gain = input
                    var cum = Math.random()
                    console.log(cum);
                    if (cum <= 0.5) {
                        gain = Math.floor(gain*1.5)
                        UI.prompt.innerText = `HEADS, MADE ${gain}`
                        UI.actions.innerHTML = `
                            <button id="goAgainBtn" class="btn-atk">GO AGAIN</button>
                            <button id="cashOutBtn" class="btn-pot">CASH OUT (${gain})</button>
                        `
                        document.getElementById("goAgainBtn").addEventListener("click", () => {
                            GAMBLE_GAMES[0].action(gain)
                        });
                        document.getElementById("cashOutBtn").addEventListener("click", () => {
                            gold += gain;
                            updateHUD();
                            UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000);
                        });
                    } else {
                        gain = 0
                        UI.prompt.innerText = `TAILS, LOST EVERYTHING`
                        UI.actions.innerHTML = ``
                        updateHUD();
                        UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000);
                    }
                },
                min: 2
            },
            {
                name: "OVER UNDER",
                action: function(input, num = Math.round(Math.random()*20)) {
                    var gain = input;
                    UI.actions.innerHTML = `
                            <button id="overBtn" class="btn-atk">OVER</button>
                            <button id="underBtn" class="btn-atk">UNDER</button>
                            <button id="cashOutBtn" class="btn-pot">CASH OUT (${gain})</button>
                        `
                    UI.prompt.innerText = `OVER OR UNDER ${num}`
                    document.getElementById("overBtn").addEventListener("click", () => {
                        var newnum = Math.round(Math.random()*20)
                        if (newnum > num) {
                            UI.prompt.innerText = `${newnum}`
                            gain += Math.floor(gain/4)
                            setTimeout(GAMBLE_GAMES[1].action, 1000, gain, newnum)
                        } else if (newnum == num) {
                            UI.prompt.innerText = `SAME VALUE ${newnum}`
                            setTimeout(GAMBLE_GAMES[1].action, 1000, gain, newnum)
                        } else {
                            UI.prompt.innerText = `LOST ${newnum} < ${num}`
                            UI.actions.innerHTML = ``
                            updateHUD();
                            UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000);
                        }
                    });
                    
                    document.getElementById("underBtn").addEventListener("click", () => {
                        var newnum = Math.round(Math.random()*20)
                        if (newnum < num) {
                            UI.prompt.innerText = `${newnum}`
                            gain += Math.floor(gain/4)
                            setTimeout(GAMBLE_GAMES[1].action, 1000, gain, newnum)
                        } else if (newnum == num) {
                            UI.prompt.innerText = `SAME VALUE ${newnum}`
                            setTimeout(GAMBLE_GAMES[1].action, 1000, gain, newnum)
                        } else {
                            UI.prompt.innerText = `LOST ${newnum} > ${num}`
                            UI.actions.innerHTML = ``
                            updateHUD();
                            UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000);
                        }
                    });
                    
                    document.getElementById("cashOutBtn").addEventListener("click", () => {
                        gold += gain;
                        updateHUD();
                        UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000);
                    });
                }
            }
        ]
        
        // ==========================================
        //  WEBGL GRAPHICS ENGINE
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.04);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x222233));
        const light = new THREE.PointLight(0xffffff, 2, 50);
        light.position.set(0, 3, 5); scene.add(light);

        const objLoader = new THREE.OBJLoader();
        function loadCustomGeometry(key, filePath) {
            objLoader.load(
                filePath,
                (obj) => {
                    // An OBJ file imports as a Group. We traverse it to find the Mesh data.
                    obj.traverse((child) => {
                        if (child.isMesh) {
                            // Scale/normalize geometry size here if your custom models are massive
                            child.geometry.center();
                            
                            // Inject the custom geometry into our global registry
                            geometries[key] = child.geometry;
                            console.log(`Successfully loaded 3D asset for: ${key}`);
                        }
                    });
                },
                (xhr) => { /* Optional: Progress tracking */ },
                (error) => { console.error(`Error loading 3D asset (${filePath}):`, error); }
            );
        }

        const geometries = {
            room: new THREE.IcosahedronGeometry(1.8, 1),
            wolf: new THREE.TetrahedronGeometry(1.8, 0),
            golem: new THREE.BoxGeometry(2, 2, 2),
            wraith: new THREE.TorusKnotGeometry(1, 0.3, 64, 8),
            chest: new THREE.DodecahedronGeometry(1.3, 0),
            merchant: new THREE.ConeGeometry(1.3, 2.5, 5),
            scroll: new THREE.CylinderGeometry(0.3, 0.3, 1.5, 12),
            guardian: new THREE.TorusKnotGeometry( 10, 3, 64, 8, 9, 3)
        };
        

        let activeEntities = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const partGeo = new THREE.BufferGeometry();
        const arr = new Float32Array(400 * 3);
        for(let i=0; i<1200; i++) arr[i] = (Math.random() - 0.5) * 25;
        partGeo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
        const partMesh = new THREE.Points(partGeo, new THREE.PointsMaterial({size: 0.06, color: 0x6666aa}));
        scene.add(partMesh);
        camera.position.set(0, 0, 7);

        let mainTarget = null, leftChoice = null, rightChoice = null, shakeTimer = 0, globalTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            globalTime += 0.02; partMesh.rotation.y += 0.0005;

            if (mainTarget) {
                mainTarget.rotation.x += 0.01; mainTarget.rotation.y += 0.015;
                mainTarget.position.y = Math.sin(globalTime * 2) * 0.15;
                if (shakeTimer > 0) { shakeTimer--; mainTarget.position.x = (Math.random() - 0.5) * 0.3; }
                else mainTarget.position.x = 0;
            }
            if (leftChoice && rightChoice) {
                leftChoice.rotation.y += 0.01; rightChoice.rotation.y += 0.01;
                leftChoice.position.y = Math.sin(globalTime * 3) * 0.1;
                rightChoice.position.y = Math.cos(globalTime * 3) * 0.1;
            }
            renderer.render(scene, camera);
        }
        animate();

        function clearSceneObjects() {
            if(mainTarget) scene.remove(mainTarget); if(leftChoice) scene.remove(leftChoice); if(rightChoice) scene.remove(rightChoice);
            mainTarget = leftChoice = rightChoice = null; activeEntities = [];
            document.getElementById('path-left').style.display = 'none';
            document.getElementById('path-right').style.display = 'none';
        }

        // ==========================================
        //  UI & HUD LOGIC
        // ==========================================
        const UI = {
            lvl: document.getElementById('lbl-level'), exp: document.getElementById('lbl-exp'), expNeed: document.getElementById('lbl-exp-needed'),
            hpTxt: document.getElementById('lbl-hp'), mpTxt: document.getElementById('lbl-mp'),
            hpFill: document.getElementById('player-hp-fill'), mpFill: document.getElementById('player-mp-fill'),
            depth: document.getElementById('lbl-depth'), gold: document.getElementById('lbl-gold'),
            wep: document.getElementById('lbl-wep'), arm: document.getElementById('lbl-arm'),
            eName: document.getElementById('enemy-name'), eHud: document.getElementById('enemy-hud'), eHpFill: document.getElementById('enemy-hp-fill'),
            prompt: document.getElementById('center-prompt'), actions: document.getElementById('combat-actions'), flash: document.getElementById('flash-overlay')
        };

        function triggerFlash(colorHex) { UI.flash.style.background = colorHex; setTimeout(() => UI.flash.style.background = "rgba(0,0,0,0)", 100); }

        function updateHUD() {
            UI.lvl.innerText = pLevel; UI.exp.innerText = pExp; UI.expNeed.innerText = pExpNeeded;
            UI.hpTxt.innerText = `${pHP}/${pMaxHP}`; UI.mpTxt.innerText = `${pMP}/${pMaxMP}`;
            UI.hpFill.style.width = `${(pHP/pMaxHP)*100}%`; UI.mpFill.style.width = `${(pMP/pMaxMP)*100}%`;
            UI.depth.innerText = depth; UI.gold.innerText = gold;
            UI.wep.innerText = `${equipment.weapon.name} (+${equipment.weapon.atk})`;
            UI.arm.innerText = `${equipment.armor.name} (+${equipment.armor.def})`;

            if(state === "BATTLE") {
                UI.eHud.style.display = "block";
                UI.eHpFill.style.width = `${(activeEnemy.hp/activeEnemy.max)*100}%`;
            } else UI.eHud.style.display = "none";
        }

        // ==========================================
        //  GAME LOOP / PATH SELECTION
        // ==========================================
        window.addEventListener('click', (e) => {
            if (state === "START_SCREEN") { startGame(); return; }
            if (state === "GAME_OVER_SCREEN") { resetPlayerStatsToDefault(); startGame(); return; }
            if (state !== "CHOOSE") return; // Blocks choice raycasting during inventory management states

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(activeEntities);
            if (intersects.length > 0) {
                executePathSelection(intersects[0].object.name === "left" ? currentLeftRoom : currentRightRoom);
            }
        });

        function resetPlayerStatsToDefault() {
            pHP = 30; pMaxHP = 30; pMP = 10; pMaxMP = 10; pLevel = 1; pExp = 0; pExpNeeded = 10; gold = 20; depth = 0;
            inventory = { hpPotions: 2, mpPotions: 1, weapons: [], armors: [] };
            equipment = { weapon: { name: "RUSTY DAGGER", atk: 2 }, armor: { name: "CLOTH TUNIC", def: 1 } };
            knownSpells = [ { id: "zap", name: "⚡ SPARK", cost: 3, baseDmg: 8, color: "rgba(255,255,0,0.4)" } ];
        }

        function startGame() { buildChoiceEnvironment(); }
        
        function getWeightedRoom(depth, excludeRoom = null) {
            const validRooms = ROOM_POOL.filter(room =>
                (room.minDepth ?? 0) <= depth &&
                room !== excludeRoom
            );

            const totalWeight = validRooms.reduce(
                (sum, room) => sum + room.chance,
                0
            );

            let roll = Math.random() * totalWeight;

            for (const room of validRooms) {
                roll -= room.chance;
                if (roll <= 0) {
                    return room;
                }
            }

            return validRooms[validRooms.length - 1];
        }

        function buildChoiceEnvironment() {
            state = "CHOOSE"; depth++; clearSceneObjects(); updateHUD();
            UI.prompt.innerText = "CHOOSE YOUR PATH"; UI.prompt.style.color = "#ffffff";
            
            // Render exploration HUD with the Inventory screen trigger
            UI.actions.style.display = "flex";
            UI.actions.innerHTML = `<button class="btn-pot" onclick="renderExplorationInventory()">🎒 INVENTORY</button>`;

            /*
            currentLeftRoom = ROOM_POOL[Math.floor(Math.random() * ROOM_POOL.length)];
            while (currentLeftRoom.minDepth < depth) {currentLeftRoom = ROOM_POOL[Math.floor(Math.random() * ROOM_POOL.length)]}
            currentRightRoom = ROOM_POOL[Math.floor(Math.random() * ROOM_POOL.length)];
            while(currentRightRoom === currentLeftRoom || currentRightRoom.minDepth < depth) currentRightRoom = ROOM_POOL[Math.floor(Math.random() * ROOM_POOL.length)];
            */
            currentLeftRoom = getWeightedRoom(depth);
            currentRightRoom = getWeightedRoom(depth, currentLeftRoom);
            
            for (const room of ROOM_POOL) {
                if (room.forceDepth === depth) {
                    currentLeftRoom = room;
                    currentRightRoom = room;
                }
            }

            const ll = document.getElementById('path-left'), lr = document.getElementById('path-right');
            ll.innerText = currentLeftRoom.name; lr.innerText = currentRightRoom.name;
            ll.style.borderColor = `#${currentLeftRoom.color.toString(16).padStart(6, "0")}`; ll.style.color = `#${currentLeftRoom.color.toString(16).padStart(6, "0")}`;
            lr.style.borderColor = `#${currentRightRoom.color.toString(16).padStart(6, "0")}`; lr.style.color = `#${currentRightRoom.color.toString(16).padStart(6, "0")}`;
            ll.style.display = 'block'; lr.style.display = 'block';

            leftChoice = new THREE.Mesh(geometries.room, new THREE.MeshStandardMaterial({color: currentLeftRoom.color, wireframe: true}));
            leftChoice.position.set(-2.5, 0.3, 0); leftChoice.name = "left"; scene.add(leftChoice); activeEntities.push(leftChoice);

            rightChoice = new THREE.Mesh(geometries.room, new THREE.MeshStandardMaterial({color: currentRightRoom.color, wireframe: true}));
            rightChoice.position.set(2.5, 0.3, 0); rightChoice.name = "right"; scene.add(rightChoice); activeEntities.push(rightChoice);
        }

        function executePathSelection(room) {
            state = "EVENT"; clearSceneObjects(); room.action();
        }

        // ==========================================
        //  EXPLORATION INVENTORY INTERFACE
        // ==========================================
        function renderExplorationInventory() {
            state = "INVENTORY_MENU"; // Temporarily locks out-of-combat room raycasting
            document.getElementById('path-left').style.display = 'none';
            document.getElementById('path-right').style.display = 'none';
            
            UI.prompt.innerText = "EQUIPMENT MANAGEMENT";
            
            let html = `<div style="width:100%; text-align:center; color:#ff5555; font-size:0.9rem; margin-bottom:5px;">--- WEAPONS BAG ---</div>`;
            if (inventory.weapons.length === 0) {
                html += `<p style="font-size:0.8rem; color:#666; width:100%; text-align:center;">No stored weapons</p>`;
            }
            inventory.weapons.forEach((w, index) => {
                html += `<button class="btn-atk" onclick="equipItemFromBag('weapon', ${index})">${w.name} (+${w.atk} ATK)</button>`;
            });
            
            html += `<div style="width:100%; text-align:center; color:#aaaaaa; font-size:0.9rem; margin:15px 0 5px 0;">--- ARMORS BAG ---</div>`;
            if (inventory.armors.length === 0) {
                html += `<p style="font-size:0.8rem; color:#666; width:100%; text-align:center;">No stored armor</p>`;
            }
            inventory.armors.forEach((a, index) => {
                html += `<button class="btn-def" onclick="equipItemFromBag('armor', ${index})">${a.name} (+${a.def} DEF)</button>`;
            });
            html += `<div style="width:100%; text-align:center; color:#0800ff; font-size:0.9rem; margin-bottom:5px;">--- ITEMS BAG ---</div>`;
            html += `<button class="btn-pot" onclick="useItem('hp')">❤️ HP POTION (${inventory.hpPotions})</button>`;
            html += `<button class="btn-spl" onclick="useItem('mp')">🧪 MP POTION (${inventory.mpPotions})</button>`;
            html += `<div style="width:100%; margin-top:20px; text-align:center;"><button class="btn-back" onclick="exitExplorationInventory()">↩ CLOSE</button></div>`;
            UI.actions.innerHTML = html;
        }

        function equipItemFromBag(type, index) {
            if (type === 'weapon') {
                const standardOldWeapon = equipment.weapon;
                equipment.weapon = inventory.weapons[index];
                inventory.weapons.splice(index, 1);
                if (standardOldWeapon) inventory.weapons.push(standardOldWeapon);
            } else {
                const standardOldArmor = equipment.armor;
                equipment.armor = inventory.armors[index];
                inventory.armors.splice(index, 1);
                if (standardOldArmor) inventory.armors.push(standardOldArmor);
            }
            updateHUD();
            renderExplorationInventory(); // Live-reloads loadout allocations on selection
        }

        function exitExplorationInventory() {
            state = "CHOOSE";
            UI.prompt.innerText = "CHOOSE YOUR PATH";
            document.getElementById('path-left').style.display = 'block';
            document.getElementById('path-right').style.display = 'block';
            UI.actions.innerHTML = `<button class="btn-pot" onclick="renderExplorationInventory()">🎒 INVENTORY</button>`;
        }

        // ==========================================
        //  LOOT & EVENTS
        // ==========================================
        function grantEquipment() {
            const isWeapon = Math.random() > 0.5;
            const pool = isWeapon ? EQUIPMENT_REGISTRY.weapons : EQUIPMENT_REGISTRY.armors;
            const blueprint = pool[Math.floor(Math.random() * pool.length)];
            const scaling = Math.floor(depth * 1.5) + Math.floor(Math.random() * 3);
            
            if (isWeapon) {
                const finalAtk = blueprint.baseAtk + scaling;
                inventory.weapons.push({ name: blueprint.name, atk: finalAtk });
                UI.prompt.innerHTML = `FOUND AN ITEM!<br><span style='color:#55ff55'>ADDED TO BAG: ${blueprint.name} (+${finalAtk} ATK)</span>`;
            } else {
                const finalDef = blueprint.baseDef + scaling;
                inventory.armors.push({ name: blueprint.name, def: finalDef });
                UI.prompt.innerHTML = `FOUND AN ITEM!<br><span style='color:#55ff55'>ADDED TO BAG: ${blueprint.name} (+${finalDef} DEF)</span>`;
            }

            mainTarget = new THREE.Mesh(geometries.chest, new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            scene.add(mainTarget);
            triggerFlash("rgba(255,255,255,0.2)"); updateHUD();
            setTimeout(buildChoiceEnvironment, 2500);
        }

        function grantSpellScroll() {
            const unknownSpells = ALL_SPELLS.filter(s => !knownSpells.find(ks => ks.id === s.id));
            if (unknownSpells.length === 0) {
                inventory.mpPotions += 2;
                UI.prompt.innerHTML = "YOU ALREADY KNOW ALL MAGIC.<br><span style='color:#4488ff'>FOUND 2 MP POTIONS INSTEAD.</span>";
            } else {
                const spell = unknownSpells[Math.floor(Math.random() * unknownSpells.length)];
                knownSpells.push(spell);
                UI.prompt.innerHTML = `YOU READ AN ANCIENT SCROLL!<br><span style='color:#aa55ff'>LEARNED SPELL: ${spell.name}</span>`;
            }
            mainTarget = new THREE.Mesh(geometries.scroll, new THREE.MeshStandardMaterial({color: 0xe066ff})); scene.add(mainTarget);
            triggerFlash("rgba(224,102,255,0.2)"); updateHUD();
            setTimeout(buildChoiceEnvironment, 2500);
        }

        function healPlayer(amount, text) {
            pHP = Math.min(pMaxHP, pHP + amount);
            pMP = Math.min(pMaxMP, pMP + Math.floor(amount/2));
            UI.prompt.innerHTML = `${text}<br><span style='color:#55ff55'>RESTORED HP & MP</span>`;
            triggerFlash("rgba(85,255,85,0.2)"); updateHUD();
            setTimeout(buildChoiceEnvironment, 2000);
        }

        // ==========================================
        //  COMBAT & MENU RENDERERS
        // ==========================================
        function battleEnemy(enemyId) {
            state = "BATTLE";
            const bp = ENEMY_REGISTRY[enemyId];
            activeEnemy = { blueprint: bp, max: bp.hp(depth), hp: bp.hp(depth), atk: bp.atk(depth) };

            UI.prompt.innerText = `${enemyId} ENGAGED!`; UI.prompt.style.color = "#ff3333"; UI.eName.innerText = enemyId;
            mainTarget = new THREE.Mesh(geometries[bp.model], new THREE.MeshStandardMaterial({color: bp.color, roughness: 0.5})); scene.add(mainTarget);
            
            updateHUD(); renderMainMenu();
        }

        function renderMainMenu() {
            UI.actions.style.display = "flex";
            UI.actions.innerHTML = `
                <button class="btn-atk" onclick="execMelee()">⚔️ ATTACK</button>
                <button class="btn-spl" onclick="renderMagicMenu()">🔮 MAGIC</button>
                <button class="btn-pot" onclick="renderItemMenu()">🎒 ITEMS</button>
                <button class="btn-def" onclick="execDefend()">🛡️ DEFEND</button>
            `;
        }

        function renderMagicMenu() {
            UI.actions.innerHTML = knownSpells.map((s, i) =>
                `<button class="btn-spl" onclick="execMagic(${i})">${s.name} (${s.cost} MP)</button>`
            ).join('') + `<button class="btn-back" onclick="renderMainMenu()">↩ BACK</button>`;
        }

        function renderItemMenu() {
            UI.actions.innerHTML = `
                <button class="btn-pot" onclick="useItem('hp')">❤️ HP POTION (${inventory.hpPotions})</button>
                <button class="btn-spl" onclick="useItem('mp')">🧪 MP POTION (${inventory.mpPotions})</button>
                <button class="btn-back" onclick="renderMainMenu()">↩ BACK</button>
            `;
        }

        // ==========================================
        //  PLAYER ACTIONS
        // ==========================================
        let pDefending = false;

        function execMelee(parry = false) {
            const dmg = Math.floor(Math.random() * 4) + equipment.weapon.atk + (pLevel * 2);
            activeEnemy.hp -= dmg;
            executeVisualHit();
            if (parry) {
                UI.prompt.innerText = `PARRIED ATTACK FOR -${dmg}`;
            } else {
                UI.prompt.innerText = `STRUCK WITH ${equipment.weapon.name} FOR -${dmg}`;
                advanceTurn();
            }
            
        }

        function execMagic(spellIndex) {
            const spell = knownSpells[spellIndex];
            if (pMP < spell.cost) { UI.prompt.innerText = "NOT ENOUGH MP!"; return; }
            
            pMP -= spell.cost;
            const dmg = spell.baseDmg + (pLevel * 3);
            activeEnemy.hp -= dmg;
            
            let txt = `CAST ${spell.name} FOR -${dmg}!`;
            if (spell.heals) {
                pHP = Math.min(pMaxHP, pHP + spell.heals + (pLevel * 2));
                txt += `\nHEALED +${spell.heals} HP!`;
            }
            
            UI.prompt.innerText = txt;
            triggerFlash(spell.color); executeVisualHit(); advanceTurn();
        }

        function useItem(type) {
            if (type === 'hp' && inventory.hpPotions > 0) {
                inventory.hpPotions--; pHP = Math.min(pMaxHP, pHP + Math.ceil(pMaxHP/2));
                UI.prompt.innerText = `DRANK HP POTION (+${Math.ceil(pMaxHP/2)} HP)`;
                triggerFlash("rgba(85,255,85,0.2)");
                updateHUD()
                if (state == "BATTLE") { advanceTurn()} else {exitExplorationInventory(); renderExplorationInventory()};
            } else if (type === 'mp' && inventory.mpPotions > 0) {
                inventory.mpPotions--; pMP = Math.min(pMaxMP, pMP + 15);
                UI.prompt.innerText = "DRANK MP POTION (+15 MP)";
                triggerFlash("rgba(68,136,255,0.2)");
                updateHUD()
                if (state == "BATTLE") { advanceTurn()} else {exitExplorationInventory(); renderExplorationInventory()};
            } else {
                UI.prompt.innerText = "OUT OF POTIONS!";
            }
        }

        function execDefend() {
            pDefending = true; UI.prompt.innerText = "GUARD RAISED (DMG REDUCED)"; advanceTurn();
        }

        function advanceTurn() {
            updateHUD(); renderMainMenu(); UI.actions.style.pointerEvents = "none";
            if (activeEnemy.hp <= 0) { setTimeout(executeVictory, 800); return; }

            setTimeout(() => {
                if(state !== "BATTLE") return;
                const ai = activeEnemy.blueprint.actions[Math.floor(Math.random() * activeEnemy.blueprint.actions.length)];
                if (ai.type === "attack") {
                    let rawDmg = Math.floor((Math.random() * 4 + activeEnemy.atk) * ai.mod);
                    let finalDmg = Math.max(1, rawDmg - equipment.armor.def);
                    if (pDefending) {
                        if (Math.random() < 0.5) {
                          finalDmg = Math.max(0, Math.floor(finalDmg / 2))
                          UI.prompt.innerHTML = `<span style='font-size:1.2rem; color:#ffaaaa'>${ai.text}</span><br>-${finalDmg} HP`;
                        } else {
                          finalDmg = 0;
                          execMelee(true);
                          if (activeEnemy.hp <= 0) { setTimeout(executeVictory, 800); return; }
                        }
                    } else {
                        UI.prompt.innerHTML = `<span style='font-size:1.2rem; color:#ffaaaa'>${ai.text}</span><br>-${finalDmg} HP`;
                    };
                    pHP -= finalDmg;
                    
                    triggerFlash("rgba(255,0,0,0.3)");
                } else if (ai.type === "heal") {
                    activeEnemy.hp = Math.min(activeEnemy.max, activeEnemy.hp + ai.val);
                    UI.prompt.innerHTML = `<span style='font-size:1.2rem; color:#44ff44'>${ai.text}</span><br>+${ai.val} HP`;
                }
                
                pDefending = false; updateHUD();
                if (pHP <= 0) executeGameOver(); else UI.actions.style.pointerEvents = "auto";
            }, 1200);
        }

        function executeVisualHit() {
            shakeTimer = 15; mainTarget.material.color.setHex(0xffffff);
            setTimeout(() => { if(mainTarget && activeEnemy.hp > 0) mainTarget.material.color.setHex(activeEnemy.blueprint.color); }, 100);
        }

        function executeVictory() {
            state = "EVENT"; UI.actions.style.display = "none"; UI.actions.style.pointerEvents = "auto";
            if(mainTarget) mainTarget.material.wireframe = true;
            
            const expGained = activeEnemy.blueprint.expValue;
            pExp += expGained; gold += 10 + depth * 2;

            if (pExp >= pExpNeeded) {
                while (pExp >= pExpNeeded) { pExp -= pExpNeeded; pLevel++; pExpNeeded = Math.floor(pExpNeeded * 1.5); pMaxHP += 5; pMaxMP += 3; }
                pHP = pMaxHP; pMP = pMaxMP;
                UI.prompt.innerHTML = `VICTORY! LEVEL UP!<br><span style='color:#33aaff'>REACHED LEVEL ${pLevel}</span>`;
                triggerFlash("rgba(51,170,255,0.4)");
                updateHUD(); setTimeout(buildChoiceEnvironment, 2000);
            } else if (activeEnemy.blueprint.drops && activeEnemy.blueprint.dropChance && Math.random() < activeEnemy.blueprint.dropChance) {
              clearSceneObjects();
              activeEnemy.blueprint.drops();
            } else {
                UI.prompt.innerHTML = `FOE DEFEATED<br><span style='color:#33aaff'>+${expGained} EXP</span>`;
                updateHUD(); setTimeout(buildChoiceEnvironment, 2000);
            }
        }

        function executeGameOver() {
            state = "GAME_OVER_SCREEN"; UI.actions.style.display = "none"; UI.actions.style.pointerEvents = "auto";
            UI.prompt.innerText = `YOU DIED AT DEPTH ${depth}.\nCLICK TO RESTART.`; UI.prompt.style.color = "#ff0000";
            if(mainTarget) mainTarget.material.color.setHex(0x222222);
        }

        // ==========================================
        //  SHOP LOGIC
        // ==========================================
        function openShop() {
            state = "SHOP"; UI.prompt.innerText = "MERCHANT: 'WHAT DO YOU NEED?'"; UI.prompt.style.color = "#ffd700";
            mainTarget = new THREE.Mesh(geometries.merchant, new THREE.MeshStandardMaterial({color: 0xffaa00, roughness: 0.4})); scene.add(mainTarget);

            UI.actions.style.display = "flex";
            UI.actions.innerHTML = `
              <button class="btn-pot" onclick="buyShop()">BUY</button>
              <button class="btn-atk" onclick="sellShop()">SELL</button>
              <button class="btn-back" onclick="exitShop()">🚪 LEAVE</button>
            `;
        }
        
        function buyShop() {
            UI.prompt.innerText = "MERCHANT: 'WHAT DO YOU WANT TO BUY?'";
            UI.actions.innerHTML = `
                <button class="btn-pot" onclick="buyShopItem('hp', 15)">❤️ HP POT (15G)</button>
                <button class="btn-spl" onclick="buyShopItem('mp', 15)">🧪 MP POT (15G)</button>
                <button class="btn-atk" onclick="buyShopItem('wep', 40)">⚔️ WEAPON (40G)</button>
                <button class="btn-back" onclick="clearSceneObjects(); openShop()">↩ BACK</button>
            `;
        }
        function sellShop() {
          UI.prompt.innerText = "MERCHANT: 'WHAT DO YOU WANT TO SELL?'";
          let html = `<div style="width:100%; text-align:center; color:#ff5555; font-size:0.9rem; margin-bottom:5px;">--- WEAPONS BAG ---</div>`;
          if (inventory.weapons.length === 0) {
              html += `<p style="font-size:0.8rem; color:#666; width:100%; text-align:center;">No stored weapons</p>`;
          }
          inventory.weapons.forEach((w, index) => {
              html += `<button class="btn-atk" onclick="sellShopItem('weapon', ${index})">${w.name} (+${w.atk} ATK)</button>`;
          });
          html += `<div style="width:100%; text-align:center; color:#aaaaaa; font-size:0.9rem; margin:15px 0 5px 0;">--- ARMORS BAG ---</div>`;
          if (inventory.armors.length === 0) {
              html += `<p style="font-size:0.8rem; color:#666; width:100%; text-align:center;">No stored armor</p>`;
          }
          inventory.armors.forEach((a, index) => {
              html += `<button class="btn-def" onclick="sellShopItem('armor', ${index})">${a.name} (+${a.def} DEF)</button>`;
          });
          html += `<button class="btn-back" onclick="clearSceneObjects(); openShop()">↩ BACK</button>`;
          UI.actions.innerHTML = html;
        }

        function buyShopItem(item, cost) {
            if (gold >= cost) {
                gold -= cost;
                if (item === 'hp') { inventory.hpPotions++; UI.prompt.innerText = "BOUGHT HP POTION!"; }
                if (item === 'mp') { inventory.mpPotions++; UI.prompt.innerText = "BOUGHT MP POTION!"; }
                if (item === 'wep') {
                    const wepBlueprint = EQUIPMENT_REGISTRY.weapons[Math.floor(Math.random() * EQUIPMENT_REGISTRY.weapons.length)];
                    const power = wepBlueprint.baseAtk + Math.floor(depth * 1.8) + 2;
                    inventory.weapons.push({ name: `MASTERWORK ${wepBlueprint.name}`, atk: power });
                    UI.prompt.innerText = `BOUGHT MASTERWORK ${wepBlueprint.name}! (Sent to bag)`;
                }
                triggerFlash("rgba(255,215,0,0.15)"); updateHUD();
            } else {
                UI.prompt.innerText = "NOT ENOUGH GOLD!"; triggerFlash("rgba(255,0,0,0.15)");
            }
        }
        
        function sellShopItem(type, index) {
            if (type === 'weapon') {
                const price = Math.floor(inventory.weapons[index]["atk"]*0.75);
                inventory.weapons.splice(index, 1);
                gold += price;
                updateHUD()
                clearSceneObjects();
                sellShop();
            } else {
                const price = Math.floor(inventory.armors[index]["def"]*0.75);
                inventory.armor.splice(index, 1);
                gold += price;
                updateHUD()
                clearSceneObjects();
                sellShop();
            }
        }
        
        function exitShop() { UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000); }
        
        function openTavern() {
            mainTarget = new THREE.Mesh(geometries.merchant, new THREE.MeshStandardMaterial({color: 0xffaa00, roughness: 0.4})); scene.add(mainTarget);
            UI.prompt.innerText = "WELCOME TO THE TAVERN";
            UI.actions.innerHTML = `
                <button class="btn-pot" onclick="tavernRest()">💤 REST (15G)</button>
                <button class="btn-atk" onclick="tavernGamble()">🎰 GAMBLE</button>
            `
        }
        
        function tavernRest() {
            if (gold => 15) {
                gold -= 15;
                UI.actions.innerHTML = "";
                const restType = Math.random()
                if (restType < 0.25) {
                    UI.prompt.innerText = "YOU HAD A SHORT REST"; triggerFlash("rgba(0,0,0,0.15)");
                    pHP = Math.min(pMaxHP, pHP + pMaxHP/4);
                    pMP = Math.min(pMaxMP, pMP + pMaxMP/4);
                } else if (restType < 0.75) {
                    UI.prompt.innerText = "YOU HAD A MEDIUM REST"; triggerFlash("rgba(0,0,0,0.15)");
                    pHP = Math.min(pMaxHP, pHP + pMaxHP/2);
                    pMP = Math.min(pMaxMP, pMP + pMaxMP/2);
                } else {
                    UI.prompt.innerText = "YOU HAD A LONG REST"; triggerFlash("rgba(0,0,0,0.15)");
                    pHP = pMaxHP;
                    pMP = pMaxMP;
                }
                updateHUD();
                UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000);
            } else {UI.prompt.innerText = "NOT ENOUGH GOLD!"; triggerFlash("rgba(255,0,0,0.15)");}
        }
        
        function tavernGamble() {
            const game = GAMBLE_GAMES[Math.floor(Math.random() * GAMBLE_GAMES.length)]
            UI.prompt.innerText = game.name;
            UI.actions.innerHTML = `
                <label id="gambleLabel" >input: ${game.min}</label>
                <input id="gambleInput"type="range" min="${game.min}" max="${gold}" value="${game.min}"></input>
                <button id="startGamble">🪙 START</button>`
            
            const input = document.getElementById("gambleInput");
            const label = document.getElementById("gambleLabel");

            input.addEventListener("input", () => {
                label.textContent = `input: ${input.value}`;
            });

            document.getElementById("startGamble").addEventListener("click", () => {
                if (gold < input.value) {
                    UI.prompt.innerText = "NOT ENOUGH GOLD!"; triggerFlash("rgba(255,0,0,0.15)");
                    updateHUD();
                    UI.actions.style.display = "none"; setTimeout(buildChoiceEnvironment, 1000);
                } else {
                    game.action(Number(input.value));
                    gold -= input.value
                    updateHUD();
                }
            });
        };
        

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
